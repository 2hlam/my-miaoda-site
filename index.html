<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的企业官网</title>
  <style>
    /* 让页面铺满整个浏览器，不留白 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body, iframe {
      width: 100%;
      height: 100vh; /* 占满屏幕高度 */
      border: none;    /* 去掉边框 */
      overflow: hidden; /* 隐藏滚动条，让秒搭页面自己滚动 */
    }
  </style>
</head>
